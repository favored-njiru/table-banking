<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kiarma — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="auth-page">

    <!-- LEFT PANEL -->
    <div class="auth-left">

      <!-- Replace src with your actual logo file -->
      <img src="images/logo.jpg"
           alt="Kiarma Logo"
           class="auth-brand-logo"
           onerror="this.style.display='none'" />

      <h1 class="auth-brand-name">KI-ARMA</h1>
      <p class="auth-brand-tagline">
        Smart Group Savings,<br/>Built for Communities
      </p>

      <div class="auth-brand-features">
        <div class="auth-feature">
          <span class="feature-icon">✅</span>
          Track contributions easily
        </div>
        <div class="auth-feature">
          <span class="feature-icon">✅</span>
          Manage group members
        </div>
        <div class="auth-feature">
          <span class="feature-icon">✅</span>
          Transparent & secure
        </div>
      </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="auth-right">

      <div class="auth-card">

        <div class="auth-card-logo">
          <img src="images/logo.jpg"
               alt="Kiarma"
               class="auth-card-logo-img"
               onerror="this.style.display='none'" />
          <span class="auth-card-logo-text">KI-ARMA</span>
        </div>

        <!-- TABS -->
        <div class="auth-tabs">
          <button class="auth-tab active"
                  onclick="switchTab('login', this)">
            Login
          </button>
          <button class="auth-tab"
                  onclick="switchTab('register', this)">
            Register
          </button>
        </div>

        <!-- LOGIN FORM -->
        <div id="login" class="auth-form active">

          <div class="form-group">
            <label>Email Address</label>
            <input type="email"
                   id="login-email"
                   placeholder="you@example.com" />
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
              <input type="password"
                     id="login-password"
                     placeholder="Enter your password" />
              <span class="toggle-pw"
                    onclick="togglePassword('login-password', this)">
                👁
              </span>
            </div>
          </div>

          <div class="form-error" id="login-error"></div>

          <button class="btn-auth"
                  onclick="handleLogin()">
            SIGN IN
          </button>

          <div class="auth-footer-links">
            <a href="#" onclick="switchTab('register',
               document.querySelectorAll('.auth-tab')[1]);
               return false;">
              Don't have an account? Register
            </a>
          </div>

        </div>

        <!-- REGISTER FORM -->
        <div id="register" class="auth-form">

          <div class="form-group">
            <label>Full Name</label>
            <input type="text"
                   id="reg-name"
                   placeholder="e.g. Michael Johnson" />
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email"
                   id="reg-email"
                   placeholder="you@example.com" />
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
              <input type="password"
                     id="reg-password"
                     placeholder="Create a password" />
              <span class="toggle-pw"
                    onclick="togglePassword('reg-password', this)">
                👁
              </span>
            </div>
          </div>

          <div class="form-group">
            <label>Role</label>
            <select id="reg-role">
              <option value="member">Member</option>
              <option value="treasurer">Treasurer</option>
            </select>
          </div>

          <div class="form-error" id="reg-error"></div>

          <button class="btn-auth"
                  onclick="handleRegister()">
            CREATE ACCOUNT
          </button>

          <div class="auth-footer-links">
            <a href="#" onclick="switchTab('login',
               document.querySelectorAll('.auth-tab')[0]);
               return false;">
              Already have an account? Login
            </a>
          </div>

        </div>

      </div>

    </div>

  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
