<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kiarma — Members</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"></div>
      <span>Kiarma</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon">🏠</span> Dashboard
      </a>
      <a href="contributions.html" class="nav-item">
        <span class="nav-icon">💳</span> Contributions
      </a>
      <a href="members.html" class="nav-item active">
        <span class="nav-icon">👥</span> Members
      </a>
      <a href="wallet.html" class="nav-item">
        <span class="nav-icon">👛</span> Wallet
      </a>
      <a href="profile.html" class="nav-item">
        <span class="nav-icon">👤</span> Profile
      </a>
      <a href="loans.html" class="nav-item">
        <span class="nav-icon">💰</span> Loans
      </a>
    </nav>
    <div class="sidebar-bottom">
      <button class="btn-logout" onclick="logout()">🚪 Logout</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <h1 class="page-title">Group Members</h1>
      <div class="topbar-right">
        <span class="group-label">📋 Ndegwa's Group</span>
        <div class="topbar-avatar" id="topbar-avatar">NG</div>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <!-- STAT CARDS -->
      <div class="stats-grid">
        <div class="stat-card blue">
          <div class="stat-label">Total Members</div>
          <div class="stat-value" id="stat-total">0</div>
        </div>
        <div class="stat-card teal">
          <div class="stat-label">Active Members</div>
          <div class="stat-value" id="stat-active">0</div>
        </div>
        <div class="stat-card violet">
          <div class="stat-label">Treasurer</div>
          <div class="stat-value dark" id="stat-treasurer">1</div>
        </div>
        <div class="stat-card aqua">
          <div class="stat-label">Pending Payments</div>
          <div class="stat-value dark"
               style="color:#f59e0b;"
               id="stat-pending">0</div>
        </div>
      </div>

      <!-- MEMBERS TABLE CARD -->
      <div class="card">
        <div class="contrib-header">
          <div class="card-title" style="margin-bottom:0;">
            All Members
          </div>
          <button class="btn-primary" onclick="openAddModal()">
            + Add Member
          </button>
        </div>

        <!-- SEARCH -->
        <div class="filter-row">
          <input type="text"
                 id="search-input"
                 class="filter-select"
                 style="flex:1; max-width:300px;"
                 placeholder="🔍 Search member by name..."
                 oninput="renderMembers()" />
          <select class="filter-select"
                  id="filter-role"
                  onchange="renderMembers()">
            <option value="all">All Roles</option>
            <option value="treasurer">Treasurer</option>
            <option value="member">Member</option>
          </select>
        </div>

        <!-- TABLE -->
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Member</th>
                <th>Email</th>
                <th>Role</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="members-body"></tbody>
          </table>
        </div>

        <div id="members-empty"
             style="display:none; text-align:center;
                    padding:40px 0; color:#9ca3af;">
          <div style="font-size:40px; margin-bottom:10px;">👤</div>
          <div style="font-size:14px;">No members found.</div>
        </div>

      </div>

    </div>
  </div>

  <!-- ── ADD MEMBER MODAL ── -->
  <div class="modal-overlay"
       id="add-overlay"
       onclick="closeAddModal()"></div>

  <div class="modal" id="add-modal">
    <div class="modal-header">
      <div class="modal-title">Add New Member</div>
      <button class="modal-close"
              onclick="closeAddModal()">✕</button>
    </div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text"
             id="add-name"
             placeholder="e.g. Jane Doe" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email"
             id="add-email"
             placeholder="e.g. jane@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password"
             id="add-password"
             placeholder="Create a password" />
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="add-role">
        <option value="member">Member</option>
      </select>
    </div>
    <div class="form-error" id="add-error"></div>
    <div style="display:flex; gap:10px; margin-top:6px;">
      <button class="btn-secondary"
              onclick="closeAddModal()">Cancel</button>
      <button class="btn-primary"
              style="flex:1;"
              onclick="addMember()">Add Member</button>
    </div>
  </div>

  <!-- ── EDIT MEMBER MODAL ── -->
  <div class="modal-overlay"
       id="edit-overlay"
       onclick="closeEditModal()"></div>

  <div class="modal" id="edit-modal">
    <div class="modal-header">
      <div class="modal-title">Edit Member</div>
      <button class="modal-close"
              onclick="closeEditModal()">✕</button>
    </div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="edit-name" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="edit-email" />
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="edit-role">
        <option value="member">Member</option>
        <option value="treasurer">Treasurer</option>
      </select>
    </div>
    <div class="form-error" id="edit-error"></div>
    <div style="display:flex; gap:10px; margin-top:6px;">
      <button class="btn-secondary"
              onclick="closeEditModal()">Cancel</button>
      <button class="btn-primary"
              style="flex:1;"
              onclick="saveEdit()">Save Changes</button>
    </div>
  </div>

  <!-- ── VIEW MEMBER MODAL ── -->
  <div class="modal-overlay"
       id="view-overlay"
       onclick="closeViewModal()"></div>

  <div class="modal" id="view-modal" style="max-width:480px;">
    <div class="modal-header">
      <div class="modal-title">Member Details</div>
      <button class="modal-close"
              onclick="closeViewModal()">✕</button>
    </div>
    <div id="view-content"></div>
  </div>

  <script src="../js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="../js/members.js"></script>
</body>
</html>
