<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><Kiarma-Contributions></title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../Treasurer/dashboard.css">
</head>
<body>
    <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
        <img src="../images/logo.jpg" width="40" height="40" class="logo-icon" />
      <span>KIA-RMA</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon">🏠</span> Dashboard
      </a>
      <a href="contributions.html" class="nav-item active">
        <span class="nav-icon">💳</span> Contributions
      </a>
      <a href="members.html" class="nav-item">
        <span class="nav-icon">👥</span> Members
        </a>
      <a href="wallet.html" class="nav-item">
        <span class="nav-icon">👛</span>Wallet
      </a>
      <a href="loan.html" class="nav-item">
        <span class="nav-icon">💰</span>Loans
      </a>
    </nav>
    <div class="sidebar-bottom">
      <button class="btn-logout" onclick="logout()">🚪 Logout</button>
    </div>
  </div>
<!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-left">
        <h1 class="page-title">Contributions</h1>
      </div>
      <div class="topbar-right">
        <span class="group-label">📋 Ndegwa's Group</span>
        <div class="topbar-avatar" id="topbar-avatar">NG</div>
      </div>
    </div>

  <!-- CONTENT -->
    <div class="content">

  <!-- SUMMARY CARDS -->
      <div class="stats-grid" style="grid-template-columns: repeat(4,1fr);">
        <div class="stat-card blue">
          <div class="stat-label">Total Collected</div>
          <div class="stat-value" id="total-collected">Ksh 0</div>
        </div>
        <div class="stat-card teal">
          <div class="stat-label">Paid</div>
          <div class="stat-value" id="total-paid-count">0</div>
        </div>
        <div class="stat-card aqua">
          <div class="stat-label">Pending</div>
          <div class="stat-value dark" id="total-pending-count">0</div>
        </div>
        <div class="stat-card violet" style="border-left: 4px solid #e8dfdf;">
          <div class="stat-label">Overdue</div>
          <div class="stat-value dark" style="color:#ffffff;"
               id="total-overdue-count">0</div>
        </div>
      </div>

      <!-- TABLE CARD -->
      <div class="card">

        <!-- CARD HEADER -->
        <div class="contrib-header">
          <div class="card-title" style="margin-bottom:0;">
            All Contributions
          </div>
          <button class="btn-primary" onclick="openModal()">
            + Record Payment
          </button>
        </div>

        <!-- FILTERS -->
        <div class="filter-row">
          <select class="filter-select" id="filter-member"
                  onchange="renderTable()">
            <option value="all">All Members</option>
          </select>
          <select class="filter-select" id="filter-status"
                  onchange="renderTable()">
            <option value="all">All Statuses</option>
            <option value="paid">Paid</option>
            <option value="pending">Pending</option>
            <option value="overdue">Overdue</option>
          </select>
        </div>

         <!-- TABLE -->
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Member</th>
                <th>Status</th>
                <th>Amount</th>
                <th>Due Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="contributions-body">
            </tbody>
          </table>
        </div>

        <!-- EMPTY STATE -->
        <div id="empty-state" style="display:none;
             text-align:center; padding:40px 0; color:#9ca3af;">
          <div style="font-size:40px; margin-bottom:10px;">📭</div>
          <div style="font-size:14px;">No contributions found.</div>
        </div>
      </div>
  </div>
   <!--RECORD PAYMENT MODAL ── -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()"></div>

  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title">Record Payment</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="form-group">
      <label>Member</label>
      <select id="modal-member">
      </select>
    </div>
    <div class="form-group">
      <label>Amount (Ksh)</label>
      <input type="number" id="modal-amount" placeholder="e.g. 100" />
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="modal-status">
        <option value="paid">Paid</option>
        <option value="pending">Pending</option>
        <option value="overdue">Overdue</option>
      </select>
    </div>
    <div class="form-group">
      <label>Due Date</label>
      <input type="date" id="modal-date" />
    </div>

    <div class="form-error" id="modal-error"></div>

    <div style="display:flex; gap:10px; margin-top:6px;">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" style="flex:1;"
              onclick="recordPayment()">Save Payment</button>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="../js/contributions.js"></script>
</html>
